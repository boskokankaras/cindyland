<script>
/* ============ SHEET / MODAL okvir ============ */
let sheetOpen = false;
function openSheet(title, html, fab){
  $('#sheetTitle').textContent = title;
  $('#sheetBody').innerHTML = html;
  const f = $('#sheetFab');
  if (fab){
    f.innerHTML = I.plus + ' ' + esc(fab.label);
    f.dataset.act = fab.act;
    f.style.display = 'flex';
    $('#sheet').classList.add('has-fab');
  } else {
    f.style.display = 'none';
    $('#sheet').classList.remove('has-fab');
  }
  $('#sheet').classList.add('open');
  $('#sheetOverlay').classList.add('open');
  document.body.classList.add('noscroll');
  $('#sheetBody').scrollTop = 0;
  if (!sheetOpen){ history.pushState({ sheet: 1 }, ''); sheetOpen = true; }
}
function closeSheet(viaPop){
  if (!sheetOpen) return;
  $('#sheet').classList.remove('open');
  $('#sheetOverlay').classList.remove('open');
  document.body.classList.remove('noscroll');
  sheetOpen = false;
  SF = null;
  if (!viaPop && history.state && history.state.sheet) history.back();
}
window.addEventListener('popstate', () => { if (sheetOpen) closeSheet(true); });

function showModal(html, wide){ $('#modalHost').innerHTML = `<div class="modal-overlay" data-act="modal-close"><div class="modal ${wide ? 'modal-wide' : ''}">${html}</div></div>`; }
function closeModal(){ $('#modalHost').innerHTML = ''; }
function confirmModal(title, text, act, id, btnLabel, danger){
  showModal(`<div class="modal-title">${esc(title)}</div><div class="modal-text">${text}</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-act="modal-close">Otkaži</button>
      <button class="btn ${danger ? 'btn-danger' : 'btn-primary'}" data-act="${act}" data-id="${id}">${esc(btnLabel)}</button>
    </div>`);
}

/* ============ NAPLATA ============ */
function chargeModal(stayId){
  const st = D.stays.find(s => s.id === stayId); if (!st) return;
  const amount = stayAmount(st);
  const days = stayDays(st);
  showModal(`<div class="modal-title">Naplata</div>
    <div class="modal-text">${esc(stayLabel(st))} · ${days} dan${days === 1 ? '' : 'a'} (${fmtD(st.from)} – ${fmtD(st.to)})</div>
    <div class="fld"><label class="lbl">Iznos (€)</label>
      <input type="text" inputmode="decimal" id="chargeAmount" value="${amount || ''}" style="font-size:22px;font-weight:800;text-align:center">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" data-act="modal-close">Otkaži</button>
      <button class="btn btn-ok" data-act="charge-confirm" data-id="${st.id}">${I.check} Naplaćeno</button>
    </div>`);
  setTimeout(() => { const i = $('#chargeAmount'); if (i){ i.focus(); i.select(); } }, 60);
}
function chargeConfirm(stayId){
  const st = D.stays.find(s => s.id === stayId); if (!st) return;
  const val = parseMoney($('#chargeAmount').value);
  if (val == null){ toast('Upiši iznos.'); return; }
  st.price = val; st.paid = true; st.paidAt = todayISO();
  dbSave('stays', st);
  closeModal(); if (sheetOpen) closeSheet(); render();
  toast('Naplaćeno ' + money(val));
}
</script>
<script>
/* ============ FORMA BORAVKA ============ */
let SF = null;

function openStayForm(opts){
  opts = opts || {};
  if (opts.stayId){
    const st = D.stays.find(s => s.id === opts.stayId); if (!st) return;
    SF = {
      id: st.id, clientId: st.clientId, clientQ: '', newClient: null,
      petIds: new Set(st.petIds || []), newPets: [], petForm: null,
      type: st.type, from: st.from, to: st.to, calCur: st.from.slice(0, 7),
      boxId: st.boxId || '', price: st.price != null ? String(st.price) : '',
      paid: !!st.paid, paidAt: st.paidAt || null, note: st.note || '',
    };
  } else {
    const from = opts.date || '';
    SF = {
      id: null, clientId: opts.clientId || null, clientQ: '', newClient: null,
      petIds: new Set(), newPets: [], petForm: null,
      type: 'pansion', from, to: '', calCur: (from || todayISO()).slice(0, 7),
      boxId: opts.boxId || '', price: '', paid: false, paidAt: null, note: '',
    };
    if (SF.clientId){
      const pets = petsOfClient(SF.clientId);
      if (pets.length === 1) SF.petIds.add(pets[0].id);
    }
  }
  renderStayForm();
}

/* pokupi tekstualna polja iz DOM-a u draft (da re-render ne pojede unos) */
function sfSync(){
  if (!SF) return;
  const g = id => document.getElementById(id);
  if (g('sfPrice')) SF.price = g('sfPrice').value;
  if (g('sfNote')) SF.note = g('sfNote').value;
  if (g('sfBox')) SF.boxId = g('sfBox').value;
  if (SF.newClient){
    if (g('sfNcName')) SF.newClient.name = g('sfNcName').value;
    if (g('sfNcPhone')) SF.newClient.phone = g('sfNcPhone').value;
  }
  if (SF.petForm){
    if (g('sfPfName')) SF.petForm.name = g('sfPfName').value;
    if (g('sfPfBreed')) SF.petForm.breed = g('sfPfBreed').value;
  }
}
function sfDraftPets(){
  return [...SF.petIds].map(petById).filter(Boolean).concat(SF.newPets);
}

/* birač termina — jedan kalendar, klik od pa do (kao K-Sport) */
function drCalHTML(){
  const [cy, cm] = SF.calCur.split('-').map(Number);
  const od = SF.from || '';
  const doo = SF.type === 'dnevni' ? od : (SF.to || '');
  const t = todayISO();
  const first = new Date(cy, cm - 1, 1);
  const start = new Date(first);
  start.setDate(1 - ((first.getDay() + 6) % 7));
  let days = '';
  for (let i = 0; i < 42; i++){
    const d = new Date(start); d.setDate(start.getDate() + i);
    const iso = isoFromDate(d);
    const inMonth = d.getMonth() === cm - 1;
    const isStart = iso === od, isEnd = iso === doo;
    const single = od && doo && od === doo;
    const isIn = od && doo && iso > od && iso < doo;
    days += `<button type="button" class="dr-day ${inMonth ? '' : 'other'} ${iso === t ? 'today' : ''}
      ${isStart || isEnd ? 'r-edge' : ''} ${isStart && doo && !single ? 'r-start' : ''} ${isEnd && !single ? 'r-end' : ''} ${isIn ? 'r-in' : ''}"
      data-act="dr-pick" data-id="${iso}"><span class="dr-num num">${d.getDate()}</span></button>`;
  }
  const dows = DOWS_S.map((x, i) => `<span class="dr-dow ${i === 6 ? 'ned' : ''}">${x}</span>`).join('');
  let foot;
  if (SF.type === 'dnevni'){
    foot = od ? `Dan: <strong>${fmtDY(od)}</strong>` : 'Izaberi dan';
  } else if (od && doo){
    const n = diffDays(od, doo) + 1;
    foot = `Trajanje: <strong>${n} ${n === 1 ? 'dan' : 'dana'}</strong> · ${fmtDY(od)} – ${fmtDY(doo)}`;
  } else if (od){
    foot = `Dolazak: <strong>${fmtDY(od)}</strong> — sad izaberi dan odlaska`;
  } else {
    foot = 'Izaberi datum dolaska i odlaska';
  }
  return `<div class="dr">
    <div class="dr-head">
      <button type="button" class="dr-nav" data-act="dr-nav" data-id="-12">«</button>
      <button type="button" class="dr-nav" data-act="dr-nav" data-id="-1">‹</button>
      <span class="dr-title">${monthLabel(SF.calCur)}</span>
      <button type="button" class="dr-nav" data-act="dr-nav" data-id="1">›</button>
      <button type="button" class="dr-nav" data-act="dr-nav" data-id="12">»</button>
    </div>
    <div class="dr-grid">${dows}${days}</div>
    <div class="dr-foot">${foot}</div>
  </div>`;
}
function drPick(iso){
  if (SF.type === 'dnevni'){ SF.from = iso; SF.to = iso; return; }
  const od = SF.from, doo = SF.to;
  if (!od || (od && doo)){ SF.from = iso; SF.to = ''; }
  else if (iso < od){ SF.from = iso; SF.to = ''; }
  else { SF.to = iso; }
}

function ppHTML(p, act, opts){
  opts = opts || {};
  const av = p.photo ? `<img src="${esc(p.photo)}" alt="">` : (p.species === 'macka' ? I.cat : I.dog);
  const cls = p.species === 'macka' ? 'av-m' : (p.size === 'veliki' ? 'av-vb' : 'av-mb');
  const meta = p.species === 'macka' ? 'mačka' : (p.size === 'veliki' ? 'veliki pas' : 'mali pas');
  return `<button class="pp ${opts.on ? 'on' : ''}" data-act="${act}" data-id="${opts.id != null ? opts.id : p.id}">
    ${opts.del ? '<i class="pp-x">✕</i>' : ''}
    <span class="pp-av ${cls}">${av}</span>
    <span class="pp-name">${esc(petLabel(p))}</span>
    <span class="pp-meta">${meta}</span>
  </button>`;
}
function ppAddHTML(act, id, label){
  return `<button class="pp pp-add" data-act="${act}" ${id ? `data-id="${id}"` : ''}>
    <span class="pp-av">${I.plus}</span>
    <span class="pp-name">${label || 'Dodaj'}</span>
  </button>`;
}

function petMiniFormHTML(pf, idPrefix){
  return `<div class="mini-form">
    <div class="fld"><input type="text" id="${idPrefix}Name" placeholder="Ime ljubimca (ili rasa) *" value="${esc(pf.name)}"></div>
    <div class="fld"><div class="seg">
      <button class="seg-btn ${pf.species === 'pas' ? 'active' : ''}" data-act="sf-pf-species" data-id="pas">Pas</button>
      <button class="seg-btn ${pf.species === 'macka' ? 'active' : ''}" data-act="sf-pf-species" data-id="macka">Mačka</button>
    </div></div>
    ${pf.species === 'pas' ? `<div class="fld"><div class="seg">
      <button class="seg-btn ${pf.size === 'mali' ? 'active' : ''}" data-act="sf-pf-size" data-id="mali">Mali</button>
      <button class="seg-btn ${pf.size === 'veliki' ? 'active' : ''}" data-act="sf-pf-size" data-id="veliki">Veliki</button>
    </div></div>` : ''}
    <div class="fld"><div class="seg">
      <button class="seg-btn ${pf.sex === 'muzjak' ? 'active' : ''}" data-act="sf-pf-sex" data-id="muzjak">Mužjak</button>
      <button class="seg-btn ${pf.sex === 'zenka' ? 'active' : ''}" data-act="sf-pf-sex" data-id="zenka">Ženka</button>
    </div></div>
    <div class="fld"><input type="text" id="${idPrefix}Breed" list="${pf.species === 'macka' ? 'dlMacka' : 'dlPas'}" placeholder="Rasa (opciono)" value="${esc(pf.breed)}"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" style="flex:1" data-act="sf-pf-cancel">Otkaži</button>
      <button class="btn btn-primary btn-sm" style="flex:1" data-act="sf-pf-add">Dodaj</button>
    </div>
  </div>`;
}

function sfClientListHTML(){
  const q = SF.clientQ.trim().toLowerCase();
  let list = [...D.clients].sort((a, b) => a.name.localeCompare(b.name, 'sr'));
  if (q){
    list = list.filter(c => c.name.toLowerCase().includes(q) || (c.phone || '').toLowerCase().includes(q) ||
      petsOfClient(c.id).some(p => (p.name || '').toLowerCase().includes(q)));
  }
  if (!list.length){
    return `<div class="card"><p class="empty-line">Nema rezultata${SF.clientQ.trim() ? ' za „' + esc(SF.clientQ.trim()) + '"' : ''} — dodaj novog klijenta dugmetom ispod.</p></div>`;
  }
  return '<div class="card">' + list.map(c => {
    const pets = petsOfClient(c.id).map(petLabel).join(', ');
    return `<div class="row tappable" data-act="sf-client-pick" data-id="${c.id}">
      <div class="row-av av-p">${esc((c.name || '?')[0].toUpperCase())}</div>
      <div class="row-main">
        <div class="row-name">${esc(c.name)}${c.blacklist ? ' <span class="badge b-danger" style="vertical-align:1px">crna lista</span>' : ''}</div>
        <div class="row-meta">${esc(pets || 'bez ljubimaca')}${c.phone ? ' · ' + esc(c.phone) : ''}</div>
      </div>
      <span class="chev" style="width:18px;height:18px">${I.chev}</span>
    </div>`;
  }).join('') + '</div>';
}

function renderStayForm(){
  const edit = !!SF.id;

  /* --- klijent --- */
  let clientHTML = '';
  if (SF.clientId){
    const c = clientById(SF.clientId);
    clientHTML = `<div class="row" style="border:none;padding:4px 0">
      <div class="row-av av-p">${esc((c.name || '?')[0].toUpperCase())}</div>
      <div class="row-main"><div class="row-name">${esc(c.name)}</div>${c.phone ? `<div class="row-meta num">${esc(c.phone)}</div>` : ''}</div>
      <button class="iconbtn" data-act="sf-client-pop" data-id="${c.id}" aria-label="Izmijeni klijenta">${I.edit}</button>
    </div>
    ${c.blacklist ? `<div class="banner ban-warn" style="background:var(--danger-soft);color:var(--danger);margin:6px 0 0">${I.warn}<span><b>Crna lista</b> — ranije loše iskustvo sa ovim klijentom.</span></div>` : ''}`;
  } else if (SF.newClient){
    const drafts = SF.newPets.map((p, i) => ppHTML(p, 'sf-newpet-del', { id: i, del: true })).join('');
    openSheet('Novi klijent', `
      <div style="text-align:right;margin-bottom:2px"><button style="color:var(--primary);font-weight:700;font-size:14px" data-act="sf-client-clear">nazad na pretragu</button></div>
      <div class="fld"><label class="lbl">Ime i prezime *</label><input type="text" id="sfNcName" value="${esc(SF.newClient.name)}"></div>
      <div class="fld"><label class="lbl">Telefon</label><input type="tel" id="sfNcPhone" value="${esc(SF.newClient.phone)}"></div>
      <div class="paid-row" style="margin-bottom:14px">
        <span class="pr-lbl" style="color:var(--danger)">Crna lista</span>
        <button class="switch ${SF.newClient.blacklist ? 'on' : ''}" data-act="nc-black" aria-label="Crna lista"></button>
      </div>
      <div class="fld"><label class="lbl">Ljubimci</label>
        <div class="pet-pick">${drafts}${SF.petForm ? '' : ppAddHTML('sf-pet-form', '', 'Dodaj')}</div>
        ${SF.petForm ? petMiniFormHTML(SF.petForm, 'sfPf') : ''}
        ${SF.petForm ? '<p class="hint">Sliku ljubimca dodaješ čim sačuvaš klijenta — klikom na njegov krug.</p>' : ''}
      </div>
      <button class="btn btn-primary btn-block" data-act="sf-save-client" style="margin-top:10px">Sačuvaj klijenta</button>
    `);
    return;
  } else {
    clientHTML = `<div style="position:relative;margin-bottom:12px">
      <input type="search" id="sfClientQ" placeholder="Pretraži klijente i ljubimce…" value="${esc(SF.clientQ)}" autocomplete="off" style="padding-left:40px">
      <span style="position:absolute;left:12px;top:11px;width:20px;height:20px;color:var(--muted)">${I.search}</span>
    </div>
    <div id="sfClientList">${sfClientListHTML()}</div>`;
  }

  /* --- ljubimci: avatari, + vodi na karticu klijenta --- */
  let petsHTML = '';
  if (SF.clientId){
    const existing = petsOfClient(SF.clientId);
    petsHTML = `<div class="fld"><label class="lbl">Ljubimci</label>
      <div class="pet-pick">
        ${existing.map(p => ppHTML(p, 'sf-pet-toggle', { on: SF.petIds.has(p.id) })).join('')}
        ${ppAddHTML('sf-client-pop', SF.clientId, 'Dodaj')}
      </div></div>`;
  }

  /* --- vrsta + termin --- */
  const datesHTML = `
    <div class="fld"><label class="lbl">Vrsta boravka</label><div class="seg">
      <button class="seg-btn ${SF.type === 'pansion' ? 'active' : ''}" data-act="sf-type" data-id="pansion">Pansion (noćenje)</button>
      <button class="seg-btn ${SF.type === 'dnevni' ? 'active' : ''}" data-act="sf-type" data-id="dnevni">Dnevno čuvanje</button>
    </div></div>
    <div class="fld"><label class="lbl">Termin</label>${drCalHTML()}</div>`;

  /* --- boks (padajući meni) --- */
  const from = SF.from, to = SF.type === 'dnevni' ? SF.from : SF.to;
  const validRange = from && to && to >= from;
  let boxOpts = '<option value="">— izaberi boks —</option>';
  for (const g of ['mb', 'vb', 'm']){
    const items = sortedBoxes().filter(b => b.group === g && (b.active || b.id === SF.boxId));
    if (!items.length) continue;
    boxOpts += `<optgroup label="${GROUPS[g]}">`;
    boxOpts += items.map(b => {
      const conflicts = validRange ? boxStays(b.id, from, to, SF.id) : [];
      const busy = conflicts.length > 0;
      const who = busy ? stayLabel(conflicts[0]) : '';
      return `<option value="${b.id}" ${SF.boxId === b.id ? 'selected' : ''}>${esc(b.name)}${busy ? ' — zauzet (' + esc(who.length > 18 ? who.slice(0, 17) + '…' : who) + ')' : ''}</option>`;
    }).join('');
    boxOpts += '</optgroup>';
  }
  const selBusy = SF.boxId && validRange && boxStays(SF.boxId, from, to, SF.id).length > 0;
  const boxHTML = `<div class="fld"><label class="lbl">Mjesto (boks)</label>
    <select id="sfBox">${boxOpts}</select>
    ${selBusy ? `<div class="banner ban-warn" style="margin-top:10px;margin-bottom:0">${I.warn}<span>Pažnja: izabrani boks je već zauzet u ovom terminu.</span></div>` : ''}
  </div>`;

  /* --- cijena + naplata --- */
  const estPets = sfDraftPets();
  const est = estimateFor(estPets, SF.type, from, to);
  const days = SF.type === 'dnevni' ? 1 : (validRange ? diffDays(from, to) + 1 : 0);
  const priceHTML = `
    <div class="form-grid2" style="align-items:end">
      <div class="fld" style="margin-bottom:0"><label class="lbl">Cijena (€)</label><input type="text" inputmode="decimal" id="sfPrice" placeholder="${est || ''}" value="${esc(SF.price)}"></div>
      <div class="paid-row"><span class="pr-lbl">Naplaćeno</span><button class="switch ${SF.paid ? 'on' : ''}" data-act="sf-paid" aria-label="Naplaćeno"></button></div>
    </div>
    ${est ? `<p class="hint" style="margin-top:6px">Predračun po cjenovniku: <b class="num">${money(est)}</b> (${days} dan${days === 1 ? '' : 'a'} × ${estPets.length} ljubim${estPets.length === 1 ? 'ac' : 'ca'}). Ako polje ostaviš prazno, važi predračun; upiši iznos samo ako ste se dogovorili drugačije.</p>` : ''}`;

  const noteHTML = `<div class="fld" style="margin-top:14px"><label class="lbl">Napomena</label>
    <textarea id="sfNote" placeholder="npr. preuzimanje popodne, nosi svoju hranu, terapija…">${esc(SF.note)}</textarea></div>`;

  const actionsHTML = `
    <button class="btn btn-primary btn-block" data-act="sf-save" style="margin-top:4px">${edit ? 'Sačuvaj izmjene' : 'Sačuvaj boravak'}</button>
    ${edit ? `<button class="btn btn-danger btn-block" data-act="stay-del" data-id="${SF.id}" style="margin-top:10px">${I.trash} Obriši boravak</button>` : ''}`;

  const picking = !SF.clientId && !SF.newClient;
  openSheet(edit ? 'Boravak' : 'Novi boravak', `
    <div class="fld"><label class="lbl">Vlasnik</label>${clientHTML}</div>
    ${petsHTML}
    ${(SF.clientId || SF.newClient) ? datesHTML + boxHTML + priceHTML + noteHTML + actionsHTML : ''}
  `, picking ? { label: 'Dodaj klijenta', act: 'sf-client-new' } : null);
}

function sfSaveClient(){
  sfSync();
  const name = (SF.newClient.name || '').trim();
  if (!name){ toast('Upiši ime klijenta.'); return; }
  const pending = [...SF.newPets];
  if (SF.petForm && SF.petForm.name.trim()) pending.push({ ...SF.petForm });
  if (!pending.length){ toast('Dodaj bar jednog ljubimca.'); return; }
  const c = { id: uid(), name, phone: (SF.newClient.phone || '').trim(), note: '', blacklist: !!SF.newClient.blacklist };
  D.clients.push(c); dbSave('clients', c);
  for (const np of pending){
    const p = { id: uid(), clientId: c.id, name: np.name.trim(), species: np.species,
      size: np.species === 'macka' ? null : np.size, sex: np.sex || null, breed: (np.breed || '').trim(), note: '', photo: null };
    D.pets.push(p); dbSave('pets', p);
    SF.petIds.add(p.id);
  }
  SF.clientId = c.id; SF.newClient = null; SF.newPets = []; SF.petForm = null;
  render(); renderStayForm();
  toast('Klijent sačuvan.');
}

function sfSave(){
  sfSync();
  const clientId = SF.clientId;
  if (!clientId){ toast('Izaberi klijenta.'); return; }
  const petIds = [...SF.petIds];
  if (!petIds.length){ toast('Izaberi bar jednog ljubimca.'); return; }
  const from = SF.from;
  const to = SF.type === 'dnevni' ? SF.from : SF.to;
  if (!from){ toast('Izaberi datum dolaska.'); return; }
  if (!to){ toast('Izaberi datum odlaska u kalendaru.'); return; }
  if (to < from){ toast('Odlazak ne može biti prije dolaska.'); return; }
  if (!SF.boxId){ toast('Izaberi mjesto (boks).'); return; }
  const price = parseMoney(SF.price);

  if (SF.id){
    const st = D.stays.find(s => s.id === SF.id);
    Object.assign(st, { petIds, type: SF.type, from, to, boxId: SF.boxId, price, paid: SF.paid, note: SF.note.trim() });
    if (SF.paid && !st.paidAt) st.paidAt = todayISO();
    if (!SF.paid) st.paidAt = null;
    dbSave('stays', st);
    toast('Boravak sačuvan.');
  } else {
    const st = {
      id: uid(), clientId, petIds, type: SF.type, from, to,
      boxId: SF.boxId, price, paid: SF.paid, paidAt: SF.paid ? todayISO() : null,
      note: SF.note.trim(), createdAt: new Date().toISOString(),
    };
    D.stays.push(st);
    dbSave('stays', st);
    toast('Boravak dodat.');
  }
  closeSheet(); render();
}

function stayDelete(id){
  D.stays = D.stays.filter(s => s.id !== id);
  dbKill('stays', id);
  closeModal(); closeSheet(); render();
  toast('Boravak obrisan.');
}
</script>
<script>
/* ============ POPUP kartice klijenta (iz forme boravka) ============ */
let CE = null; // {clientId, name, phone, petForm, added[]}

function openClientPop(cid){
  const c = clientById(cid); if (!c) return;
  CE = { clientId: cid, name: c.name, phone: c.phone || '', petForm: null, added: [] };
  renderClientPop();
}
function cePopSync(){
  if (!CE) return;
  const g = id => document.getElementById(id);
  if (g('ceName')) CE.name = g('ceName').value;
  if (g('cePhone')) CE.phone = g('cePhone').value;
  if (CE.petForm){
    if (g('cePfName')) CE.petForm.name = g('cePfName').value;
    if (g('cePfBreed')) CE.petForm.breed = g('cePfBreed').value;
  }
}
function cePetFormHTML(pf){
  const p = pf.id ? petById(pf.id) : null;
  return `<div class="mini-form">
    <div class="fld"><input type="text" id="cePfName" placeholder="Ime ljubimca (ili rasa) *" value="${esc(pf.name)}"></div>
    <div class="fld"><div class="seg">
      <button class="seg-btn ${pf.species === 'pas' ? 'active' : ''}" data-act="ce-pf-species" data-id="pas">Pas</button>
      <button class="seg-btn ${pf.species === 'macka' ? 'active' : ''}" data-act="ce-pf-species" data-id="macka">Mačka</button>
    </div></div>
    ${pf.species === 'pas' ? `<div class="fld"><div class="seg">
      <button class="seg-btn ${pf.size === 'mali' ? 'active' : ''}" data-act="ce-pf-size" data-id="mali">Mali</button>
      <button class="seg-btn ${pf.size === 'veliki' ? 'active' : ''}" data-act="ce-pf-size" data-id="veliki">Veliki</button>
    </div></div>` : ''}
    <div class="fld"><div class="seg">
      <button class="seg-btn ${pf.sex === 'muzjak' ? 'active' : ''}" data-act="ce-pf-sex" data-id="muzjak">Mužjak</button>
      <button class="seg-btn ${pf.sex === 'zenka' ? 'active' : ''}" data-act="ce-pf-sex" data-id="zenka">Ženka</button>
    </div></div>
    <div class="fld"><input type="text" id="cePfBreed" list="${pf.species === 'macka' ? 'dlMacka' : 'dlPas'}" placeholder="Rasa (opciono)" value="${esc(pf.breed)}"></div>
    ${p && sb ? `<div class="fld"><div style="display:flex;align-items:center;gap:12px">
      <div class="pet-photo ${p.species === 'macka' ? 'av-m' : (p.size === 'veliki' ? 'av-vb' : 'av-mb')}">${p.photo ? `<img src="${esc(p.photo)}" alt="">` : (p.species === 'macka' ? I.cat : I.dog)}</div>
      <button class="btn btn-ghost btn-sm" data-act="pet-photo-pick">${p.photo ? 'Promijeni sliku' : I.plus + ' Dodaj sliku'}</button>
      <input type="file" id="petPhotoFile" accept="image/*" data-pet="${p.id}" style="display:none">
    </div></div>` : ''}
    ${!p && sb ? '<p class="hint" style="margin:-6px 2px 10px">Sliku dodaješ čim sačuvaš ljubimca — klikom na njegov krug.</p>' : ''}
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" style="flex:1" data-act="ce-pf-cancel">Otkaži</button>
      <button class="btn btn-primary btn-sm" style="flex:1" data-act="ce-pf-save">${pf.id ? 'Sačuvaj' : 'Dodaj'}</button>
    </div>
  </div>`;
}
function renderClientPop(){
  const c = clientById(CE.clientId); if (!c) return;
  const pets = petsOfClient(c.id);
  showModal(`
    <div class="modal-title">Klijent</div>
    <div class="fld"><label class="lbl">Ime i prezime</label><input type="text" id="ceName" value="${esc(CE.name)}"></div>
    <div class="fld"><label class="lbl">Telefon</label><input type="tel" id="cePhone" value="${esc(CE.phone)}"></div>
    <div class="paid-row" style="margin-bottom:14px">
      <span class="pr-lbl" style="color:var(--danger)">Crna lista</span>
      <button class="switch ${c.blacklist ? 'on' : ''}" id="ceBlack" data-act="ce-black" aria-label="Crna lista"></button>
    </div>
    <div class="fld" style="margin-bottom:6px"><label class="lbl">Ljubimci</label>
      <div class="pet-pick">
        ${pets.map(p => ppHTML(p, 'ce-pet-edit')).join('')}
        ${CE.petForm ? '' : ppAddHTML('ce-pet-new', '', 'Dodaj')}
      </div>
      ${CE.petForm ? cePetFormHTML(CE.petForm) : ''}
    </div>
    <button class="btn btn-primary btn-block" data-act="ce-done" style="margin-top:12px">Gotovo</button>
  `, true);
}
function cePfSave(){
  cePopSync();
  const pf = CE.petForm;
  if (!pf.name.trim()){ toast('Upiši ime ljubimca.'); return; }
  if (pf.id){
    const p = petById(pf.id);
    Object.assign(p, { name: pf.name.trim(), species: pf.species,
      size: pf.species === 'macka' ? null : pf.size, sex: pf.sex, breed: (pf.breed || '').trim() });
    dbSave('pets', p);
  } else {
    const p = { id: uid(), clientId: CE.clientId, name: pf.name.trim(), species: pf.species,
      size: pf.species === 'macka' ? null : pf.size, sex: pf.sex || null, breed: (pf.breed || '').trim(), note: '', photo: null };
    D.pets.push(p); dbSave('pets', p);
    CE.added.push(p.id);
  }
  CE.petForm = null;
  renderClientPop();
}
function ceDone(){
  cePopSync();
  const c = clientById(CE.clientId);
  const name = CE.name.trim();
  if (!name){ toast('Ime je obavezno.'); return; }
  c.name = name; c.phone = CE.phone.trim();
  c.blacklist = $('#ceBlack').classList.contains('on');
  dbSave('clients', c);
  const added = CE.added;
  const cid = CE.clientId;
  CE = null;
  closeModal();
  if (SF && SF.clientId === cid){ added.forEach(id => SF.petIds.add(id)); renderStayForm(); }
  render();
}

/* ============ KLIJENT / LJUBIMAC forme ============ */
function clientFormSheet(cid){
  const c = cid ? clientById(cid) : null;
  openSheet(c ? 'Izmijeni klijenta' : 'Novi klijent', `
    <div class="card">
      <div class="fld"><label class="lbl">Ime i prezime *</label><input type="text" id="cfName" value="${esc(c ? c.name : '')}"></div>
      <div class="fld"><label class="lbl">Telefon</label><input type="tel" id="cfPhone" value="${esc(c ? c.phone : '')}"></div>
      <div class="fld"><label class="lbl">Napomena</label><textarea id="cfNote" placeholder="npr. komšija, dovodi uvijek dva psa…">${esc(c ? c.note : '')}</textarea></div>
      <div class="paid-row" style="margin-bottom:14px">
        <span class="pr-lbl" style="color:var(--danger)">Crna lista</span>
        <button class="switch ${c && c.blacklist ? 'on' : ''}" id="cfBlack" data-act="cf-black" aria-label="Crna lista"></button>

<script>
/* ============ SLIKA LJUBIMCA ============ */
async function uploadPetPhoto(petId, file){
  const p = petById(petId); if (!p || !sb) return;
  toast('Slika se šalje…');
  try {
    let bmp;
    try { bmp = await createImageBitmap(file); }
    catch (e){
      bmp = await new Promise((res, rej) => {
        const im = new Image();
        im.onload = () => res(im); im.onerror = rej;
        im.src = URL.createObjectURL(file);
      });
    }
    const w = bmp.width || bmp.naturalWidth, h = bmp.height || bmp.naturalHeight;
    const scale = Math.min(1, 700 / Math.max(w, h));
    const cv = document.createElement('canvas');
    cv.width = Math.round(w * scale); cv.height = Math.round(h * scale);
    cv.getContext('2d').drawImage(bmp, 0, 0, cv.width, cv.height);
    const blob = await new Promise(r => cv.toBlob(r, 'image/jpeg', 0.84));
    if (!blob) throw new Error('konverzija');
    const path = 'pets/' + petId + '.jpg';
    const { error } = await sb.storage.from('slike').upload(path, blob, { upsert: true, contentType: 'image/jpeg' });
    if (error) throw error;
    p.photo = CFG.url + '/storage/v1/object/public/slike/' + path + '?v=' + Date.now();
    await dbSave('pets', p);
    if (CE){ renderClientPop(); } else { petFormSheet(petId, null); }
    render();
    toast('Slika sačuvana.');
  } catch (e){
    toast('Slika nije poslata — pokušaj drugu ili provjeri internet.');
  }
}

/* ============ REZERVNA KOPIJA ============ */
function backupExport(){
  D.lastBackup = new Date().toISOString();
  save();
  const blob = new Blob([JSON.stringify(D, null, 1)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cindyland-kopija-' + todayISO() + '.json';
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 800);
  render();
  toast('Kopija je sačuvana kao fajl.');
}
function backupImport(file){
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const d = JSON.parse(reader.result);
      if (!d || !Array.isArray(d.stays) || !Array.isArray(d.clients)) throw new Error('bad');
      showModal(`<div class="modal-title">Vrati iz kopije?</div>
        <div class="modal-text">Fajl sadrži: ${d.clients.length} klijenata, ${d.pets ? d.pets.length : 0} ljubimaca, ${d.stays.length} boravaka.<br><br><b>Ovo će zamijeniti sve trenutne podatke u aplikaciji.</b></div>
        <div class="modal-actions">
          <button class="btn btn-ghost" data-act="modal-close">Otkaži</button>
          <button class="btn btn-primary" data-act="import-confirm">Vrati podatke</button>
        </div>`);
      backupImport._pending = d;
    } catch (e){ toast('Fajl nije prepoznat kao Cindyland kopija.'); }
  };
  reader.readAsText(file);
}
function importConfirm(){
  const d = backupImport._pending; if (!d) return;
  const def = defaultData();
  for (const k of Object.keys(def)) if (d[k] === undefined) d[k] = def[k];
  d.stays.forEach(st => { if (!st.boxId && Array.isArray(st.boxIds)) st.boxId = st.boxIds[0] || null; });
  D = d; save(); closeModal(); render();
  toast('Podaci su vraćeni iz kopije.');
}

<script>
/* ============ SUPABASE sloj (baza na serveru) ============ */
const DB_MAP = {
  clients: r => ({ id: r.id, name: r.name, phone: r.phone || '', note: r.note || '', blacklist: !!r.blacklist }),
  pets: r => ({ id: r.id, client_id: r.clientId, name: r.name, species: r.species, size: r.size, sex: r.sex, breed: r.breed || '', note: r.note || '', photo: r.photo || null }),
  stays: r => ({ id: r.id, client_id: r.clientId, pet_ids: r.petIds || [], type: r.type, from_date: r.from, to_date: r.to, box_id: r.boxId, price: r.price, paid: !!r.paid, paid_at: r.paidAt, note: r.note || '', created_at: r.createdAt || new Date().toISOString() }),
  boxes: r => ({ id: r.id, name: r.name, grp: r.group, active: !!r.active, sort: r.sort || 0 }),
};
const DB_UNMAP = {
  clients: r => ({ id: r.id, name: r.name, phone: r.phone || '', note: r.note || '', blacklist: !!r.blacklist }),
  pets: r => ({ id: r.id, clientId: r.client_id, name: r.name, species: r.species, size: r.size, sex: r.sex, breed: r.breed || '', note: r.note || '', photo: r.photo || null }),
  stays: r => ({ id: r.id, clientId: r.client_id, petIds: r.pet_ids || [], type: r.type, from: r.from_date, to: r.to_date, boxId: r.box_id, price: r.price == null ? null : Number(r.price), paid: !!r.paid, paidAt: r.paid_at, note: r.note || '', createdAt: r.created_at }),
  boxes: r => ({ id: r.id, name: r.name, group: r.grp, active: !!r.active, sort: r.sort || 0 }),
};

async function dbSave(table, obj){
  save();
  if (!sb) return;
  try {
    const row = DB_MAP[table] ? DB_MAP[table](obj) : obj;
    const { error } = await sb.from(table).upsert(row);
    if (error) throw error;
  } catch (e){ toast('Nije sačuvano na server — provjeri internet.'); }
}
async function dbKill(table, id){
  save();
  if (!sb) return;
  try {
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) throw error;
  } catch (e){ toast('Brisanje nije stiglo na server — provjeri internet.'); }
}
async function dbSavePrices(){
  save();
  if (!sb) return;
  try {
    const { error } = await sb.from('settings').upsert({ key: 'prices', value: D.prices });
    if (error) throw error;
  } catch (e){ toast('Nije sačuvano na server — provjeri internet.'); }
}

let loadTimer = null;
/* Supabase vraća najviše 1000 redova po upitu — čitaj u serijama dok ne stigne sve */
async function fetchAll(table){
  const out = [];
  const CH = 1000;
  for (let from = 0;; from += CH){
    const { data, error } = await sb.from(table).select('*').range(from, from + CH - 1);
    if (error) throw error;
    out.push(...data);
    if (data.length < CH) break;
  }
  return out;
}
async function loadAll(){
  if (!sb) return;
  try {
    const [c, p, s, b, st] = await Promise.all([
      fetchAll('clients'), fetchAll('pets'), fetchAll('stays'), fetchAll('boxes'), fetchAll('settings'),
    ]);
    D.clients = c.map(DB_UNMAP.clients);
    D.pets = p.map(DB_UNMAP.pets);
    D.stays = s.map(DB_UNMAP.stays);
    if (b.length) D.boxes = b.map(DB_UNMAP.boxes);
    const pr = st.find(x => x.key === 'prices');
    if (pr && pr.value) D.prices = pr.value;
    OFFLINE = false;
    save(); render();
  } catch (e){
    OFFLINE = true; render();
  }
}
function scheduleReload(){
  clearTimeout(loadTimer);
  loadTimer = setTimeout(loadAll, 600);
}
function initRealtime(){
  if (!sb) return;
  try {
    sb.channel('cindy-db')
      .on('postgres_changes', { event: '*', schema: 'public' }, scheduleReload)
      .subscribe();
  } catch (e){}
}

<script>
/* ============ PWA / AŽURIRANJE (ista logika kao K-Sport Hub) ============ */
const PWA = { reg: null, needRefresh: false, lastCheck: 0, hadController: false };

function flagNeedRefresh(){
  if (PWA.needRefresh) return;
  PWA.needRefresh = true;
  if (APP_SHOWN) renderTabbar();
  const box = $('#updBox'); if (box) box.classList.add('show');
}
function trackInstalling(sw){
  if (!sw) return;
  // "hadController" = stranicu je pri učitavanju već kontrolisala starija verzija,
  // pa je svaki novi worker UPDATE (a ne prva instalacija — tada nema obavještenja).
  const ready = () => (sw.state === 'installed' || sw.state === 'activated') && PWA.hadController;
  if (ready()){ flagNeedRefresh(); return; }
  sw.addEventListener('statechange', () => { if (ready()) flagNeedRefresh(); });
}
async function initPWA(){
  if (!('serviceWorker' in navigator)) return;
  try {
    PWA.hadController = !!navigator.serviceWorker.controller;
    const reg = await navigator.serviceWorker.register('./sw.js');
    PWA.reg = reg;
    if (reg.waiting && PWA.hadController) flagNeedRefresh();
    if (reg.installing) trackInstalling(reg.installing);
    reg.addEventListener('updatefound', () => trackInstalling(reg.installing));
  } catch (e){}
}
function applyUpdate(){
  const reg = PWA.reg;
  if (!reg || !reg.waiting){ window.location.reload(); return; }
  let reloaded = false;
  const doReload = () => { if (reloaded) return; reloaded = true; window.location.reload(); };
  navigator.serviceWorker.addEventListener('controllerchange', doReload);
  reg.waiting.postMessage({ type: 'SKIP_WAITING' });
  setTimeout(doReload, 3000);
}
function autoCheckUpdate(){
  const now = Date.now();
  if (now - PWA.lastCheck < 60000) return;
  PWA.lastCheck = now;
  try { PWA.reg && PWA.reg.update(); } catch (e){}
}
async function checkForUpdate(){
  const okBox = $('#verOk');
  if (okBox) okBox.classList.remove('show');
  if (PWA.needRefresh || (PWA.reg && PWA.reg.waiting)){ flagNeedRefresh(); return; }
  if (!PWA.reg){ if (okBox) okBox.classList.add('show'); return; }
  const reg = PWA.reg;
  const result = await new Promise((resolve) => {
    let done = false;
    const finish = (res) => { if (done) return; done = true; reg.removeEventListener('updatefound', onFound); clearTimeout(to); resolve(res); };
    const track = (sw) => {
      if (!sw) return;
      const ready = () => (sw.state === 'installed' || sw.state === 'activated') && PWA.hadController;
      if (ready()){ finish('update'); return; }
      sw.addEventListener('statechange', () => { if (ready()) finish('update'); });
    };
    const onFound = () => track(reg.installing);
    reg.addEventListener('updatefound', onFound);
    if (reg.installing) track(reg.installing);
    const to = setTimeout(() => finish(reg.waiting ? 'update' : 'current'), 10000);
    Promise.resolve(reg.update()).then(() => {
      if (reg.waiting) finish('update');
    }).catch(() => finish('current'));
  });
  if (result === 'update') flagNeedRefresh();
  else { const ok = $('#verOk'); if (ok) ok.classList.add('show'); }
}
</script>

    case 'ce-pet-edit': cePopSync(); { const p = petById(id); CE.petForm = { id: p.id, name: p.name, species: p.species, size: p.size || 'mali', sex: p.sex, breed: p.breed || '' }; } renderClientPop(); break;

    case 'sf-pf-species': sfSync(); SF.petForm.species = id; renderStayForm(); break;
    case 'sf-pf-size': sfSync(); SF.petForm.size = id; renderStayForm(); break;
    case 'sf-pf-sex': sfSync(); SF.petForm.sex = SF.petForm.sex === id ? null : id; renderStayForm(); break;
    case 'sf-pf-cancel': sfSync(); SF.petForm = null; renderStayForm(); break;
    case 'sf-pf-add': sfSync(); {
        if (!SF.petForm.name.trim()){ toast('Upiši ime ljubimca.'); break; }
        SF.newPets.push({ ...SF.petForm }); SF.petForm = null; renderStayForm();
      } break;
    case 'sf-type': sfSync(); SF.type = id; if (id === 'dnevni' && SF.from) SF.to = SF.from; renderStayForm(); break;
    case 'dr-nav': sfSync(); SF.calCur = ymShift(SF.calCur, Number(id)); renderStayForm(); break;
    case 'dr-pick': sfSync(); drPick(id); renderStayForm(); break;
    case 'sf-paid': sfSync(); SF.paid = !SF.paid; renderStayForm(); break;
    case 'sf-save': sfSave(); break;
    /* klijenti */
    case 'client-open': clientSheet(id); break;
    case 'client-edit': clientFormSheet(id); break;
    case 'client-del': confirmModal('Obrisati klijenta?', 'Obrisaće se i svi njegovi ljubimci i boravci. Ovo se ne može poništiti.', 'client-del-yes', id, 'Obriši', true); break;
    case 'client-del-yes': clientDelete(id); break;
    case 'pet-new': petFormSheet(null, id); break;
    case 'pet-edit': petFormSheet(id, null); break;
    case 'pet-del': confirmModal('Obrisati ljubimca?', 'Boravci ostaju sačuvani.', 'pet-del-yes', id, 'Obriši', true); break;
    case 'pet-del-yes': petDelete(id); break;
    case 'pf-seg': {
        const seg = t.parentElement;
        if (t.dataset.seg === 'sex' && t.classList.contains('active')){ t.classList.remove('active'); break; }
        seg.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        t.classList.add('active');
        if (t.dataset.seg === 'species'){
          const w = $('#pfSizeWrap'); if (w) w.style.display = id === 'macka' ? 'none' : '';
          const b = $('#pfBreed'); if (b) b.setAttribute('list', id === 'macka' ? 'dlMacka' : 'dlPas');
        }
      } break;
    case 'pf-save': pfSave(id || null, t.dataset.client || null); break;
    case 'cf-save': cfSave(id || null); break;
    case 'cf-black': t.classList.toggle('on'); break;
    /* podešavanja */
    case 'prices-open': pricesSheet(); break;
    case 'prices-save': {
        const g = x => parseMoney($(x).value);
        const np = { mali: g('#prMali'), veliki: g('#prVeliki'), macka: g('#prMacka'), dnevni: g('#prDnevni') };
        if (Object.values(np).some(v => v == null)){ toast('Provjeri iznose.'); break; }
        D.prices = np; dbSavePrices(); closeSheet(); render(); toast('Cjenovnik sačuvan.');
      } break;
    case 'boxes-open': boxesSheet(); break;
    case 'box-toggle': { const b = boxById(id); b.active = !b.active; dbSave('boxes', b); boxesSheet(); } break;
    case 'box-add': {
        const name = $('#newBoxName').value.trim();
        if (!name){ toast('Upiši naziv.'); break; }
        const maxSort = Math.max(0, ...D.boxes.map(b => b.sort || 0));
        const b = { id: uid(), name, group: $('#newBoxGroup').value, active: true, sort: maxSort + 1 };
        D.boxes.push(b); dbSave('boxes', b); boxesSheet(); toast('Dodato.');
      } break;
    case 'install-help': installHelpSheet(); break;
    case 'pet-photo-pick': { const f = $('#petPhotoFile'); if (f) f.click(); } break;
    /* backup */
    case 'backup-export': backupExport(); break;
    case 'backup-import': $('#importFile').click(); break;
    case 'import-confirm': importConfirm(); break;
    case 'backup-banner': setTab('jos'); break;
    /* update */
    case 'upd-apply': applyUpdate(); break;
    case 'upd-check': checkForUpdate(); break;
    /* okvir */
    case 'sheet-close': closeSheet(); break;
    case 'modal-close':
      if (t.classList.contains('modal-overlay') && e.target.closest('.modal')) break;
      if (CE){ const cid = CE.clientId; CE = null; closeModal(); if (SF && SF.clientId === cid) renderStayForm(); render(); break; }
      closeModal(); break;
  }
});

document.addEventListener('input', (e) => {
  if (e.target.id === 'klSearch'){ KL_Q = e.target.value; const l = $('#klList'); if (l) l.innerHTML = klListHTML(); }
  if (e.target.id === 'sfClientQ' && SF){
    SF.clientQ = e.target.value;
    const l = $('#sfClientList'); if (l) l.innerHTML = sfClientListHTML();
  }
});
document.addEventListener('change', (e) => {
  if (e.target.id === 'sfBox' && SF){ SF.boxId = e.target.value; sfSync(); renderStayForm(); }
  if (e.target.id === 'importFile' && e.target.files[0]){ backupImport(e.target.files[0]); e.target.value = ''; }
  if (e.target.id === 'petPhotoFile' && e.target.files[0]){ uploadPetPhoto(e.target.dataset.pet, e.target.files[0]); e.target.value = ''; }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.target.id === 'loginPass' || e.target.id === 'loginEmail')) doLogin();
});

/* kad prođe ponoć (ili se app otvori u novom danu) — „Danas" se sam prebaci na novi dan */
let LAST_DAY = todayISO();
function dayTick(){
  if (todayISO() === LAST_DAY) return;
  LAST_DAY = todayISO();
  if (APP_SHOWN) render();
}
setInterval(dayTick, 60 * 1000);

document.addEventListener('visibilitychange', () => { if (!document.hidden){ dayTick(); autoCheckUpdate(); if (sb && APP_SHOWN) scheduleReload(); } });
window.addEventListener('focus', autoCheckUpdate);
setInterval(autoCheckUpdate, 30 * 60 * 1000);

/* pokretanje */
(async function boot(){
  initPWA();
  if (!sb){
    await maybeSeedDemo();
    showApp(); render();
    return;
  }
  const { data: { session } } = await sb.auth.getSession();
  if (session){
    sb._cindyEmail = session.user.email;
    showApp(); render(); loadAll(); initRealtime();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange((ev, sess) => {
    if (ev === 'SIGNED_IN' && !APP_SHOWN && sess){
      sb._cindyEmail = sess.user.email;
      showApp(); render(); loadAll(); initRealtime();
    }
  });
})();
</script>
